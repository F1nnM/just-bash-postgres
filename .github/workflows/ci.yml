name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
          POSTGRES_DB: just_bash_postgres_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - name: Create test roles
        run: psql "postgres://postgres@localhost:5433/just_bash_postgres_test" -f sql/init-test-roles.sql

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test
        env:
          TEST_DATABASE_URL: postgres://postgres@localhost:5433/just_bash_postgres_test
